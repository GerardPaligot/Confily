name: CD Android

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name shown to users (e.g. 1.2.3)"
        required: true
        type: string
      version_code:
        description: "Version code (monotonically increasing integer)"
        required: true
        type: number
      track:
        description: "Play Store track"
        required: true
        default: internal
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      release_status:
        description: "Release status — draft requires manual roll-out in Play Console; completed rolls out automatically"
        required: true
        default: draft
        type: choice
        options:
          - draft
          - completed
      tag_release:
        description: "Create a git tag (vX.Y.Z) on the build commit"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: cd-android-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          build-scan-publish: true
          build-scan-terms-of-use-url: "https://gradle.com/terms-of-service"
          build-scan-terms-of-use-agree: "yes"

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Copy CI gradle.properties
        run: mkdir -p ~/.gradle ; cp .github/ci-gradle.properties ~/.gradle/gradle.properties

      - name: Verify deploy secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PROPERTIES: ${{ secrets.ANDROID_KEYSTORE_PROPERTIES }}
          PLAY_SA: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ] || [ -z "$KEYSTORE_PROPERTIES" ] || [ -z "$PLAY_SA" ]; then
            echo "Required CD secrets missing — aborting." >&2
            exit 1
          fi

      - name: Materialize signing & Play credentials
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PROPERTIES: ${{ secrets.ANDROID_KEYSTORE_PROPERTIES }}
          PLAY_SA: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          APP_PROPERTIES: ${{ secrets.APP_PROPERTIES }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > config/keystore.release
          printf '%s' "$KEYSTORE_PROPERTIES" > config/keystore.properties
          printf '%s' "$PLAY_SA" > config/play-service-account.json
          if [ -n "$APP_PROPERTIES" ]; then
            printf '%s' "$APP_PROPERTIES" > config/app.properties.prod
          fi

      - name: Build signed release bundle
        env:
          CI_VERSION_NAME: ${{ inputs.version_name }}
          CI_VERSION_CODE: ${{ inputs.version_code }}
        run: ./gradlew :androidApp:bundleRelease

      - name: Upload to Play Store (${{ inputs.track }}, ${{ inputs.release_status }})
        run: bundle exec fastlane android deploy track:${{ inputs.track }} release_status:${{ inputs.release_status }}

      - name: Tag release commit
        if: ${{ inputs.tag_release }}
        env:
          TAG: v${{ inputs.version_name }}
          VERSION_CODE: ${{ inputs.version_code }}
          TRACK: ${{ inputs.track }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG (versionCode $VERSION_CODE, track $TRACK)"
          git push origin "$TAG"

      - name: Cleanup credentials
        if: always()
        run: |
          rm -f config/keystore.release \
                config/keystore.properties \
                config/play-service-account.json \
                config/app.properties.prod
