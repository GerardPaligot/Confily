name: CD iOS

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Marketing version (CFBundleShortVersionString, e.g. 1.2.3)"
        required: true
        type: string
      version_code:
        description: "Build number (CFBundleVersion, monotonically increasing integer)"
        required: true
        type: number
      tag_release:
        description: "Create a git tag (vX.Y.Z-ios) on the build commit"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: cd-ios-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Verify deploy secrets
        env:
          DIST_CERT: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          DIST_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
          PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_KEY: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
        run: |
          for v in DIST_CERT DIST_PASSWORD PROFILE KEYCHAIN_PASSWORD ASC_KEY_ID ASC_ISSUER_ID ASC_KEY; do
            if [ -z "${!v}" ]; then
              echo "Required CD secret $v missing — aborting." >&2
              exit 1
            fi
          done

      - name: Generate iOS config
        env:
          APP_PROPERTIES: ${{ secrets.APP_PROPERTIES }}
        run: |
          if [ -n "$APP_PROPERTIES" ]; then
            printf '%s' "$APP_PROPERTIES" > config/app.properties.prod
          fi
          chmod +x iosApp/Scripts/generate_config.sh
          (cd iosApp && ./Scripts/generate_config.sh)

          for key in IOS_BUNDLE_ID IOS_TEAM_ID; do
            value=$(grep "^${key}=" iosApp/Generated.xcconfig | head -1 | cut -d= -f2-)
            if [ -z "$value" ]; then
              echo "Required key ${key} missing or empty in iosApp/Generated.xcconfig — set it in your APP_PROPERTIES secret (or config/app.properties for the committed default)." >&2
              exit 1
            fi
          done

      - name: Set up signing keychain
        env:
          DIST_CERT: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          DIST_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
          PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          CERT_PATH="$RUNNER_TEMP/dist.p12"
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          PROFILE_PATH="$PROFILE_DIR/build.mobileprovision"

          printf '%s' "$DIST_CERT" | base64 -d > "$CERT_PATH"
          mkdir -p "$PROFILE_DIR"
          printf '%s' "$PROFILE" | base64 -d > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$DIST_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | xargs)

      - name: Materialize App Store Connect API key
        env:
          ASC_KEY: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
        run: |
          mkdir -p config
          printf '%s' "$ASC_KEY" | base64 -d > config/app_store_connect_key.p8

      - name: Build & upload to App Store Connect
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          bundle exec fastlane ios deploy \
            version_name:"${{ inputs.version_name }}" \
            version_code:"${{ inputs.version_code }}"

      - name: Tag release commit
        if: ${{ inputs.tag_release }}
        env:
          TAG: v${{ inputs.version_name }}-ios
          VERSION_CODE: ${{ inputs.version_code }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "iOS Release $TAG (CFBundleVersion $VERSION_CODE)"
          git push origin "$TAG"

      - name: Cleanup credentials
        if: always()
        run: |
          rm -f config/app_store_connect_key.p8 \
                config/app.properties.prod \
                "$RUNNER_TEMP/dist.p12" \
                "$HOME/Library/MobileDevice/Provisioning Profiles/build.mobileprovision" || true
          security delete-keychain "$RUNNER_TEMP/build.keychain-db" 2>/dev/null || true
